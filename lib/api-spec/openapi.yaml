openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GradoEats Manager API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: orders
  - name: drivers
  - name: dashboard
  - name: activities
  - name: alerts
  - name: reset-requests
  - name: reviews
  - name: restaurants
  - name: players
  - name: clients
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, assigned, in_delivery, delivered, cancelled]
        - name: driverId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      summary: List all drivers
      responses:
        "200":
          description: List of drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
    post:
      operationId: createDriver
      tags: [drivers]
      summary: Create a driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriverBody"
      responses:
        "201":
          description: Created driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/auth:
    post:
      operationId: driverAuth
      tags: [drivers]
      summary: Authenticate a driver with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        "200":
          description: Authenticated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /drivers/{id}:
    get:
      operationId: getDriver
      tags: [drivers]
      summary: Get a driver by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    patch:
      operationId: updateDriver
      tags: [drivers]
      summary: Update a driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDriverBody"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    delete:
      operationId: deleteDriver
      tags: [drivers]
      summary: Delete a driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /drivers/{id}/refuse:
    post:
      operationId: recordDriverRefusal
      tags: [drivers]
      summary: Record an order refusal for a driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: integer
                  nullable: true
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}/warn:
    post:
      operationId: warnDriver
      tags: [drivers]
      summary: Send a warning to a driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}/block:
    patch:
      operationId: toggleBlockDriver
      tags: [drivers]
      summary: Block or unblock a driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                blocked:
                  type: boolean
              required:
                - blocked
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}/reviews:
    get:
      operationId: getDriverReviews
      tags: [reviews]
      summary: Get all reviews for a driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createDriverReview
      tags: [reviews]
      summary: Add a review for a driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /drivers/{id}/location:
    patch:
      operationId: updateDriverLocation
      tags: [drivers]
      summary: Update driver GPS location
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDriverLocationBody"
      responses:
        "200":
          description: Updated driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/{id}/activities:
    get:
      operationId: getDriverActivities
      tags: [drivers]
      summary: Get activity timeline for a specific driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Driver activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /drivers/{id}/today:
    get:
      operationId: getDriverTodayStats
      tags: [drivers]
      summary: Get today's stats for a driver
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Today's stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverTodayStats"

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List recent activities (all drivers)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: driverId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List active alerts (waiting orders, inactive drivers)
      responses:
        "200":
          description: Active alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard summary stats
      responses:
        "200":
          description: Summary statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/revenue:
    get:
      operationId: getRevenueStats
      tags: [dashboard]
      summary: Revenue stats grouped by day
      responses:
        "200":
          description: Revenue per day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueDay"

  /dashboard/driver-stats:
    get:
      operationId: getDriverStats
      tags: [dashboard]
      summary: Stats per driver
      responses:
        "200":
          description: Per-driver stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DriverStats"

  /dashboard/customer-stats:
    get:
      operationId: getCustomerStats
      tags: [dashboard]
      summary: Unique customer count and top 5 buyers
      responses:
        "200":
          description: Customer statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerStats"

  /reset-requests:
    get:
      operationId: listResetRequests
      tags: [reset-requests]
      summary: List all reset requests (pending first)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, sent, completed]
      responses:
        "200":
          description: List of reset requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ResetRequest"
    post:
      operationId: createResetRequest
      tags: [reset-requests]
      summary: Create a reset request for a driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateResetRequestBody"
      responses:
        "201":
          description: Created reset request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetRequest"

  /reset-requests/pending-count:
    get:
      operationId: getResetRequestsPendingCount
      tags: [reset-requests]
      summary: Get count of pending reset requests
      responses:
        "200":
          description: Pending count
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingCount"

  /reset-requests/{id}/send:
    patch:
      operationId: markResetRequestSent
      tags: [reset-requests]
      summary: Mark a reset request as sent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated reset request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetRequest"

  /reset-requests/{id}/complete:
    patch:
      operationId: markResetRequestComplete
      tags: [reset-requests]
      summary: Mark a reset request as completed
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated reset request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetRequest"

  /players:
    get:
      operationId: listPlayers
      tags: [players]
      summary: List all players ordered by score
      responses:
        "200":
          description: List of players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"
    post:
      operationId: createPlayer
      tags: [players]
      summary: Create or upsert a player
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayerBody"
      responses:
        "201":
          description: Created player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /players/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [players]
      summary: Top 50 players by score
      responses:
        "200":
          description: Ranked players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerRanked"

  /players/online:
    get:
      operationId: getOnlinePlayers
      tags: [players]
      summary: Currently online players
      responses:
        "200":
          description: Online players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Player"

  /players/stats:
    get:
      operationId: getPlayersStats
      tags: [players]
      summary: Global stats (total, online, ready for menu)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayersStats"

  /players/payment-summary:
    get:
      operationId: getPaymentSummary
      tags: [players]
      summary: Players grouped by how many diamonds they are missing
      responses:
        "200":
          description: Payment summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentSummary"

  /players/{id}:
    patch:
      operationId: updatePlayer
      tags: [players]
      summary: Update a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlayerBody"
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"
    delete:
      operationId: deletePlayer
      tags: [players]
      summary: Delete a player
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /players/{id}/ping:
    patch:
      operationId: pingPlayer
      tags: [players]
      summary: Mark player as online
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated player
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Player"

  /restaurants:
    get:
      operationId: listRestaurants
      tags: [restaurants]
      summary: List all active restaurants
      responses:
        "200":
          description: List of restaurants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Restaurant"
    post:
      operationId: createRestaurant
      tags: [restaurants]
      summary: Create a new restaurant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRestaurantBody"
      responses:
        "201":
          description: Created restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"

  /restaurants/overview:
    get:
      operationId: getRestaurantsOverview
      tags: [restaurants]
      summary: All restaurants with live today stats
      responses:
        "200":
          description: Restaurants with stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RestaurantOverview"

  /restaurants/{id}:
    patch:
      operationId: updateRestaurant
      tags: [restaurants]
      summary: Update a restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRestaurantBody"
      responses:
        "200":
          description: Updated restaurant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Restaurant"
    delete:
      operationId: deleteRestaurant
      tags: [restaurants]
      summary: Deactivate a restaurant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients with order stats
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClientBody"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/from-orders:
    get:
      operationId: getClientsFromOrders
      tags: [clients]
      summary: Auto-computed clients from order history
      responses:
        "200":
          description: Clients from orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientFromOrders"

  /clients/stats:
    get:
      operationId: getClientsStats
      tags: [clients]
      summary: Aggregate client stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientsStats"

  # ── Deliveries (livreur app) ──────────────────────────────────────────────
  /deliveries:
    get:
      operationId: listDeliveries
      tags: [deliveries]
      summary: List deliveries for a deliverer
      parameters:
        - name: delivererId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, delivered, cancelled]
      responses:
        "200":
          description: List of deliveries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Delivery"
    post:
      operationId: createDelivery
      tags: [deliveries]
      summary: Create a new delivery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeliveryBody"
      responses:
        "201":
          description: Created delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /deliveries/{id}:
    get:
      operationId: getDelivery
      tags: [deliveries]
      summary: Get a delivery by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"
    patch:
      operationId: updateDelivery
      tags: [deliveries]
      summary: Update delivery status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDeliveryBody"
      responses:
        "200":
          description: Updated delivery
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /deliveries/{id}/accept:
    post:
      operationId: acceptDelivery
      tags: [deliveries]
      summary: Accept a pending delivery dispatch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                delivererId:
                  type: integer
              required:
                - delivererId
      responses:
        "200":
          description: Delivery accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /deliveries/{id}/refuse:
    post:
      operationId: refuseDelivery
      tags: [deliveries]
      summary: Refuse a pending delivery dispatch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                delivererId:
                  type: integer
              required:
                - delivererId
      responses:
        "200":
          description: Delivery refused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /deliveries/{id}/confirm-delivered:
    post:
      operationId: confirmDelivered
      tags: [deliveries]
      summary: Confirm delivery completion with optional code
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                delivererId:
                  type: integer
                confirmCode:
                  type: string
              required:
                - delivererId
      responses:
        "200":
          description: Delivery confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Delivery"

  /deliveries/stats:
    get:
      operationId: getDeliveryStats
      tags: [deliveries]
      summary: Get delivery stats for a deliverer
      parameters:
        - name: delivererId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryStats"

  /deliveries/pending-dispatch:
    get:
      operationId: getMyPendingDispatch
      tags: [deliveries]
      summary: Get pending dispatch for a deliverer
      parameters:
        - name: delivererId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pending dispatch info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingDispatch"

  # ── Deliverers ────────────────────────────────────────────────────────────
  /deliverers/{id}:
    get:
      operationId: getDeliverer
      tags: [deliverers]
      summary: Get a deliverer (livreur) profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deliverer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"
    patch:
      operationId: updateDeliverer
      tags: [deliverers]
      summary: Update a deliverer profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDriverBody"
      responses:
        "200":
          description: Updated deliverer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # ── Trips (chauffeur app) ─────────────────────────────────────────────────
  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List trips for a driver
      parameters:
        - name: driverId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, in_progress, completed, cancelled]
      responses:
        "200":
          description: List of trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTripBody"
      responses:
        "201":
          description: Created trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}:
    get:
      operationId: getTrip
      tags: [trips]
      summary: Get a trip by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update trip status or details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTripBody"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/pickup:
    post:
      operationId: pickupPassenger
      tags: [trips]
      summary: Mark passenger as picked up
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driverId:
                  type: integer
              required:
                - driverId
      responses:
        "200":
          description: Passenger picked up
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/accept:
    post:
      operationId: acceptRide
      tags: [trips]
      summary: Accept a pending ride
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driverId:
                  type: integer
              required:
                - driverId
      responses:
        "200":
          description: Ride accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/refuse:
    post:
      operationId: refuseRide
      tags: [trips]
      summary: Refuse a pending ride
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driverId:
                  type: integer
              required:
                - driverId
      responses:
        "200":
          description: Ride refused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/counter-offer:
    post:
      operationId: counterOfferRide
      tags: [trips]
      summary: Send a counter offer for a ride
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                driverId:
                  type: integer
                offeredFare:
                  type: number
              required:
                - driverId
                - offeredFare
      responses:
        "200":
          description: Counter offer sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/stats:
    get:
      operationId: getTripStats
      tags: [trips]
      summary: Get trip stats for a driver
      parameters:
        - name: driverId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trip stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripStats"

  /trips/pending-ride:
    get:
      operationId: getMyPendingRide
      tags: [trips]
      summary: Get pending ride for a driver (cascade dispatch)
      parameters:
        - name: driverId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pending ride info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PendingRide"

  /clients/{id}:
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
